<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <meta http-equiv="refresh" content="5; url=https://shahaduddin.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #020617; /* slate-950 */
      color: #f8fafc; /* slate-50 */
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      overflow: hidden;
    }
    .container {
      max-width: 600px;
      padding: 2rem;
    }
    h1 {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #10b981; /* emerald-500 */
      margin: 0;
      animation: fadeIn 1s ease-in-out;
    }
    p {
      font-size: 1.25rem;
      margin: 1rem 0;
      animation: fadeIn 1s ease-in-out 0.2s both;
    }
    .redirect-message {
      font-size: 1rem;
      color: #94a3b8; /* slate-400 */
      animation: fadeIn 1s ease-in-out 0.4s both;
    }
    a {
      color: #10b981; /* emerald-500 */
      text-decoration: none;
      font-weight: 700;
      border: 2px solid #10b981;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      transition: background-color 0.3s, color 0.3s;
      display: inline-block;
      margin-top: 1rem;
      animation: fadeIn 1s ease-in-out 0.6s both;
    }
    a:hover {
      background-color: #10b981;
      color: #020617;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <p class="redirect-message">You will be redirected to the homepage shortly.</p>
    <a href="https://shahaduddin.com">Go to Homepage</a>
  </div>
</body>
</html>
